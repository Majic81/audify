<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Audify — read your books aloud</title>
  <meta name="description" content="Free read-aloud for your ebooks: paste text or add page photos, listen with the built-in iOS voice or a Gemini AI voice.">
  <meta name="theme-color" content="#1e1b4b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Audify">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header>
    <h1><img src="./icons/icon.svg" alt="" class="logo">Audify</h1>
    <button id="btn-settings" class="icon-btn" aria-label="Settings">&#9881;&#65039;</button>
  </header>

  <main>
    <!-- Input view: paste text or add page photos -->
    <section id="input-view">
      <textarea id="text-input" placeholder="Paste the text of your book here…&#10;&#10;Or tap “Add page photos” below and pick screenshots of your book pages — Audify extracts the text for you (needs a free Gemini API key, see Settings)." spellcheck="false"></textarea>
      <div id="ocr-status" hidden></div>
      <div class="row">
        <button id="btn-photos">&#128247; Add page photos</button>
        <button id="btn-read" class="primary">&#9654; Read this</button>
      </div>
      <input type="file" id="photo-input" accept="image/*" multiple hidden>
      <p class="hint">Tip: in Apple Books you can also use iOS’s built-in <strong>Speak Screen</strong> — see the README for the 2-minute setup.</p>
    </section>

    <!-- Reader view: highlighted sentences while listening -->
    <section id="reader-view" hidden>
      <div class="reader-bar">
        <button id="btn-back" class="icon-btn" aria-label="Back to text">&#8592; Edit text</button>
        <span id="progress-label"></span>
      </div>
      <div id="sentences" aria-live="off"></div>
    </section>
  </main>

  <footer id="controls" hidden>
    <button id="btn-prev" class="icon-btn" aria-label="Previous">&#9198;</button>
    <button id="btn-play" class="icon-btn big" aria-label="Play or pause">&#9654;</button>
    <button id="btn-next" class="icon-btn" aria-label="Next">&#9197;</button>
  </footer>

  <div id="toast" hidden></div>

  <!-- Settings -->
  <dialog id="settings">
    <form method="dialog">
      <h2>Settings</h2>

      <fieldset>
        <legend>Voice engine</legend>
        <label class="radio">
          <input type="radio" name="engine" value="web" checked>
          <span><strong>Built-in iOS voice</strong> — free, unlimited, works offline</span>
        </label>
        <label class="radio">
          <input type="radio" name="engine" value="gemini">
          <span><strong>Gemini AI voice</strong> — more natural, needs free API key + internet</span>
        </label>
      </fieldset>

      <label class="field" id="web-voice-field">
        Built-in voice
        <select id="web-voice"></select>
      </label>

      <label class="field" id="gemini-voice-field">
        Gemini voice
        <select id="gemini-voice">
          <option value="Kore">Kore — warm, balanced</option>
          <option value="Charon">Charon — deep, calm</option>
          <option value="Puck">Puck — upbeat</option>
          <option value="Zephyr">Zephyr — bright</option>
          <option value="Leda">Leda — youthful</option>
          <option value="Fenrir">Fenrir — strong</option>
        </select>
      </label>

      <label class="field">
        Speed: <span id="rate-label">1.0×</span>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
      </label>

      <label class="field">
        Gemini API key <span class="muted">(needed for page photos &amp; AI voice)</span>
        <input type="password" id="api-key" placeholder="AIza…" autocomplete="off">
      </label>
      <p class="hint">Get a key for free at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com</a> — no credit card. The key is stored only on this device.</p>

      <button class="primary" value="close">Done</button>
    </form>
  </dialog>

  <script src="./js/tts.js"></script>
  <script src="./js/ocr.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
